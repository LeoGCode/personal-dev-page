[options]
; Master password for database management (JSON-RPC db service)
admin_passwd = admin

; Database connection (must match odoo-db service in docker-compose)
db_host = odoo-db
db_port = 5432
db_user = odoo
db_password = odoo

; Allow listing databases (needed for init script)
list_db = True

; Addons path
addons_path = /mnt/extra-addons

; Logging
log_level = info
