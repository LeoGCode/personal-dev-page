name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-skip:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - id: check
        run: |
          if [[ "${{ github.event.head_commit.message }}" == *"[skip ci]"* ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

  checks:
    name: Lint, Types & Tests
    needs: check-skip
    if: needs.check-skip.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

      - name: TypeScript check
        run: npm run typecheck

      - name: Vitest
        run: npm run test

  build:
    name: Build
    needs: [check-skip, checks]
    if: needs.check-skip.outputs.skip != 'true'
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SITE_URL: https://leoneldev.com
      NEXT_PUBLIC_POSTHOG_KEY: phc_placeholder
      NEXT_PUBLIC_POSTHOG_HOST: https://us.i.posthog.com
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build
